name: Release scroll_capture (merge to main)

on:
  push:
    branches: [main]
    paths:
      - 'c/**'
      - 'VERSION'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        run: python c/scripts/bump_version.py

      - name: Generate version resource
        run: python c/scripts/generate_version_rc.py

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build exe (MSVC + VERSIONINFO)
        shell: cmd
        run: |
          for /f "usebackq delims=" %%v in ("VERSION") do set SC_VER=%%v
          if not exist c\dist mkdir c\dist
          del /q c\dist\scroll_capture_v*.exe 2>nul
          cd c
          rc /nologo /fo scroll_capture.res scroll_capture.rc
          if errorlevel 1 exit /b 1
          cl /nologo /O2 /W4 /MT /Iinclude src\main.c src\config.c src\image.c src\stitch.c src\capture.c src\png_io.c src\platform_win32.c /Fe:dist\scroll_capture_v%SC_VER%.exe /link user32.lib gdi32.lib scroll_capture.res
          if errorlevel 1 exit /b 1
          if not exist dist\scroll_capture_v%SC_VER%.exe exit /b 1
          echo Built dist\scroll_capture_v%SC_VER%.exe

      - name: Commit and push release
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VER=$(tr -d '\r\n' < VERSION)
          git add VERSION c/include/version.h c/dist/
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "release: scroll_capture v${VER} [skip ci]"
          git push

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scroll_capture-windows
          path: c/dist/scroll_capture_v*.exe
